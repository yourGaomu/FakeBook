spring:
  application:
    name: share-thing-ai-impl
  cloud:
    nacos:
      discovery:
        server-addr: 47.108.58.72:8848
        namespace: 758b786a-91d2-4183-a473-896187866151
        username: nacos
        password: nacos
      config:
        server-addr: 47.108.58.72:8848
        namespace: 758b786a-91d2-4183-a473-896187866151
        username: nacos
        password: nacos
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: share_all_leaf.yaml
            group: leaf
            refresh: true
          - data-id: share_ai.yaml
            group: mysql
            refresh: true
          - data-id: share_milvus.yaml
            group: milvus
            refresh: true
          - data-id: share_kafka.yaml
            group: kafka
            refresh: true
          - data-id: share_mongodb.yaml
            group: mongodb
            refresh: true
          - data-id: share_minio.yaml
            group: minio
            refresh: true
          - data-id: share_redis.yaml
            group: redis
            refresh: true
          - data-id: redis.yaml
            group: redis
            refresh: true
          - data-id: share_filter.yaml
            group: filter
            refresh: true
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&namespace=0d275001-e548-47ce-b78e-23dbf9fd060c&username=nacos&password=nacos

dubbo:
  application:
    name: ${spring.application.name}-rpc
  protocol:
    name: tri
    port: -1
  registry:
    address: nacos://47.108.58.72:8848
    parameters:
      namespace: 8137d93c-e3ee-497f-b73c-3b2ade2dc4ce
      username: nacos
      password: nacos
    register-mode: all
